<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat House Adventure</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #2c1810; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas { display: block; }
        
        .character-selection {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .selection-title {
            color: white;
            font-size: 3em;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .cat-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .cat-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .cat-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        .cat-preview {
            width: 100px;
            height: 100px;
            margin: 0 auto 1rem;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border-radius: 50%;
        }
        
        .cat-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .cat-description {
            color: #666;
            font-size: 0.9em;
        }
        
        .game-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }
        
        .score {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            backdrop-filter: blur(10px);
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="character-selection" id="characterSelection">
        <h1 class="selection-title">Choose Your Cat</h1>
        <div class="cat-options">
            <div class="cat-card" onclick="selectCat('siamese')">
                <div class="cat-preview" style="background: linear-gradient(45deg, #f0e68c, #daa520);"></div>
                <div class="cat-name">Siamese</div>
                <div class="cat-description">Elegant and vocal</div>
            </div>
            <div class="cat-card" onclick="selectCat('persian')">
                <div class="cat-preview" style="background: linear-gradient(45deg, #fff, #f5f5dc);"></div>
                <div class="cat-name">Persian</div>
                <div class="cat-description">Fluffy and calm</div>
            </div>
            <div class="cat-card" onclick="selectCat('tabby')">
                <div class="cat-preview" style="background: linear-gradient(45deg, #ff8c00, #8b4513);"></div>
                <div class="cat-name">Tabby</div>
                <div class="cat-description">Playful and friendly</div>
            </div>
            <div class="cat-card" onclick="selectCat('black')">
                <div class="cat-preview" style="background: linear-gradient(45deg, #2c2c2c, #000);"></div>
                <div class="cat-name">Black Cat</div>
                <div class="cat-description">Mysterious and sleek</div>
            </div>
            <div class="cat-card" onclick="selectCat('calico')">
                <div class="cat-preview" style="background: linear-gradient(45deg, #ff6347, #ffa500, #fff);"></div>
                <div class="cat-name">Calico</div>
                <div class="cat-description">Colorful and unique</div>
            </div>
            <div class="cat-card" onclick="selectCat('ginger')">
                <div class="cat-preview" style="background: linear-gradient(45deg, #ff4500, #ff8c00);"></div>
                <div class="cat-name">Ginger</div>
                <div class="cat-description">Cheerful and bold</div>
            </div>
            <div class="cat-card" onclick="selectCat('greywhite')">
                <div class="cat-preview" style="background: linear-gradient(45deg, #c0c0c0, #ffffff);"></div>
                <div class="cat-name">Grey & White</div>
                <div class="cat-description">Gentle and curious</div>
            </div>
        </div>
    </div>

    <div class="game-ui hidden" id="gameUI">
        <h3>🐱 Cat Controls</h3>
        <p>WASD/Arrows - Move</p>
        <p>Space - Jump</p>
        <p>Mouse - Look Around</p>
    </div>
    
    <div class="score hidden" id="score">
        <h3>🐟 Fish: <span id="scoreValue">0</span></h3>
    </div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script>
        let scene, camera, renderer, player, composer;
        let selectedCat = 'siamese';
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let prevTime = performance.now();
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let score = 0;
        let collectibles = [];
        let jumpableObjects = [];

        const catBreeds = {
            siamese: { color: 0xf0e68c, size: 0.8, speed: 1.2 },
            persian: { color: 0xf5f5dc, size: 1.0, speed: 0.8 },
            tabby: { color: 0xff8c00, size: 0.9, speed: 1.0 },
            black: { color: 0x2c2c2c, size: 0.85, speed: 1.1 },
            calico: { color: 0xffa500, size: 0.95, speed: 0.9 },
            ginger: { color: 0xff4500, size: 0.9, speed: 1.0 },
            greywhite: { color: 0xc0c0c0, size: 0.85, speed: 1.0 }
        };

        function selectCat(breed) {
            selectedCat = breed;
            document.getElementById('characterSelection').classList.add('hidden');
            document.getElementById('gameUI').classList.remove('hidden');
            document.getElementById('score').classList.remove('hidden');
            initGame();
        }

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x8b7355);
            scene.fog = new THREE.Fog(0x8b7355, 5, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true,
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.body.appendChild(renderer.domElement);

            // Post-processing setup
            composer = new THREE.EffectComposer(renderer);
            const renderPass = new THREE.RenderPass(scene, camera);
            composer.addPass(renderPass);

            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                0.3,  // strength
                0.4,  // radius
                0.85  // threshold
            );
            composer.addPass(bloomPass);

            // Enhanced lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(5, 10, 5);
            mainLight.castShadow = true;
            mainLight.shadow.camera.near = 0.1;
            mainLight.shadow.camera.far = 50;
            mainLight.shadow.camera.left = -20;
            mainLight.shadow.camera.right = 20;
            mainLight.shadow.camera.top = 20;
            mainLight.shadow.camera.bottom = -20;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            scene.add(mainLight);

            const fillLight = new THREE.PointLight(0xffd700, 0.8, 15);
            fillLight.position.set(0, 3, 0);
            fillLight.castShadow = true;
            scene.add(fillLight);

            // Rim light for better depth
            const rimLight = new THREE.DirectionalLight(0x4488ff, 0.3);
            rimLight.position.set(-5, 5, -5);
            scene.add(rimLight);

            // Create house
            createHouse();

            // Create cat player
            createCat();

            // Create collectibles (fish)
            createCollectibles();

            // Setup controls
            setupControls();

            animate();
        }

        function createHouse() {
            // Floor
            const floorGeometry = new THREE.PlaneGeometry(30, 30);
            const floorMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x8b4513,
                roughness: 0.7,
                metalness: 0.1,
                normalScale: new THREE.Vector2(0.5, 0.5)
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Walls
            const wallMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xf5deb3,
                roughness: 0.7,
                metalness: 0.1
            });

            // Back wall
            const backWall = new THREE.Mesh(
                new THREE.PlaneGeometry(30, 10),
                wallMaterial
            );
            backWall.position.set(0, 5, -15);
            backWall.receiveShadow = true;
            scene.add(backWall);

            // Side walls
            const leftWall = new THREE.Mesh(
                new THREE.PlaneGeometry(30, 10),
                wallMaterial
            );
            leftWall.rotation.y = Math.PI / 2;
            leftWall.position.set(-15, 5, 0);
            leftWall.receiveShadow = true;
            scene.add(leftWall);

            const rightWall = new THREE.Mesh(
                new THREE.PlaneGeometry(30, 10),
                wallMaterial
            );
            rightWall.rotation.y = -Math.PI / 2;
            rightWall.position.set(15, 5, 0);
            rightWall.receiveShadow = true;
            scene.add(rightWall);

            // Furniture
            createFurniture();
        }

        function createFurniture() {
            // Sofa
            const sofaGeometry = new THREE.BoxGeometry(6, 2, 2);
            const sofaMaterial = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
            const sofa = new THREE.Mesh(sofaGeometry, sofaMaterial);
            sofa.position.set(-8, 1, -8);
            sofa.castShadow = true;
            sofa.receiveShadow = true;
            sofa.userData.isJumpable = true;
            sofa.userData.jumpHeight = 2;
            jumpableObjects.push(sofa);
            scene.add(sofa);

            // Table
            const tableGeometry = new THREE.BoxGeometry(3, 0.2, 2);
            const tableMaterial = new THREE.MeshStandardMaterial({ color: 0x654321 });
            const table = new THREE.Mesh(tableGeometry, tableMaterial);
            table.position.set(0, 1.5, -5);
            table.castShadow = true;
            table.receiveShadow = true;
            table.userData.isJumpable = true;
            table.userData.jumpHeight = 1.7;
            jumpableObjects.push(table);
            scene.add(table);

            // Table legs
            for (let i = 0; i < 4; i++) {
                const leg = new THREE.Mesh(
                    new THREE.BoxGeometry(0.1, 1.5, 0.1),
                    tableMaterial
                );
                leg.position.set(
                    (i % 2) * 2.8 - 1.4,
                    0.75,
                    Math.floor(i / 2) * 1.8 - 0.9
                );
                leg.castShadow = true;
                scene.add(leg);
            }

            // Lamp
            const lampBase = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.5, 0.2),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            lampBase.position.set(5, 0.1, 5);
            lampBase.castShadow = true;
            scene.add(lampBase);

            const lampPole = new THREE.Mesh(
                new THREE.CylinderGeometry(0.05, 0.05, 3),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            lampPole.position.set(5, 1.5, 5);
            lampPole.castShadow = true;
            scene.add(lampPole);

            const lampShade = new THREE.Mesh(
                new THREE.ConeGeometry(1, 0.8, 8),
                new THREE.MeshStandardMaterial({ 
                    color: 0xffd700,
                    emissive: 0xffd700,
                    emissiveIntensity: 0.2
                })
            );
            lampShade.position.set(5, 3, 5);
            lampShade.castShadow = true;
            scene.add(lampShade);

            // Cat tree
            const catTreeBase = new THREE.Mesh(
                new THREE.CylinderGeometry(1, 1, 0.5),
                new THREE.MeshStandardMaterial({ color: 0x8b4513 })
            );
            catTreeBase.position.set(8, 0.25, 8);
            catTreeBase.castShadow = true;
            catTreeBase.userData.isJumpable = true;
            catTreeBase.userData.jumpHeight = 0.75;
            jumpableObjects.push(catTreeBase);
            scene.add(catTreeBase);

            const catTreePole = new THREE.Mesh(
                new THREE.CylinderGeometry(0.15, 0.15, 4),
                new THREE.MeshStandardMaterial({ color: 0x654321 })
            );
            catTreePole.position.set(8, 2.25, 8);
            catTreePole.castShadow = true;
            scene.add(catTreePole);

            const catTreeTop = new THREE.Mesh(
                new THREE.CylinderGeometry(0.8, 0.8, 0.3),
                new THREE.MeshStandardMaterial({ color: 0x8b4513 })
            );
            catTreeTop.position.set(8, 4.4, 8);
            catTreeTop.castShadow = true;
            catTreeTop.userData.isJumpable = true;
            catTreeTop.userData.jumpHeight = 4.55;
            jumpableObjects.push(catTreeTop);
            scene.add(catTreeTop);
        }

        function createCat() {
            const breed = catBreeds[selectedCat];
            
            // Create a group for the entire cat
            player = new THREE.Group();
            player.position.y = breed.size;
            
            // Cat body - slender and realistic like the photo
            const bodyGeometry = new THREE.SphereGeometry(breed.size * 0.45, 32, 20);
            bodyGeometry.scale(1.4, 0.6, 1.8); // More elongated and slender
            const bodyMaterial = new THREE.MeshStandardMaterial({ 
                color: breed.color,
                roughness: 0.3,
                metalness: 0.02
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 0;
            body.castShadow = true;
            player.add(body);

            // Cat head - more realistic proportions like the photo
            const headGeometry = new THREE.SphereGeometry(breed.size * 0.32, 24, 18);
            headGeometry.scale(1.0, 0.9, 0.85); // Slightly flattened
            const head = new THREE.Mesh(headGeometry, bodyMaterial);
            head.position.set(0, breed.size * 0.05, breed.size * 0.6);
            head.castShadow = true;
            player.add(head);

            // Snout - more refined like the photo
            const snoutGeometry = new THREE.SphereGeometry(breed.size * 0.1, 16, 12);
            snoutGeometry.scale(1.3, 0.4, 2.0);
            const snout = new THREE.Mesh(snoutGeometry, bodyMaterial);
            snout.position.set(0, -breed.size * 0.1, breed.size * 0.3);
            head.add(snout);

            // Nose - small and pink
            const noseGeometry = new THREE.SphereGeometry(breed.size * 0.03, 8, 8);
            const noseMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xff69b4,
                roughness: 0.2
            });
            const nose = new THREE.Mesh(noseGeometry, noseMaterial);
            nose.position.set(0, -breed.size * 0.08, breed.size * 0.38);
            head.add(nose);

            // Eyes - more realistic cat eyes
            for (let i = 0; i < 2; i++) {
                // Outer eye (white part)
                const outerEyeGeometry = new THREE.SphereGeometry(breed.size * 0.12, 12, 12);
                const outerEyeMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xffffff,
                    roughness: 0.3
                });
                const outerEye = new THREE.Mesh(outerEyeGeometry, outerEyeMaterial);
                outerEye.position.set((i - 0.5) * breed.size * 0.3, breed.size * 0.05, breed.size * 0.28);
                outerEye.scale(1, 0.6, 0.3);
                head.add(outerEye);

                // Iris (colored part)
                const irisGeometry = new THREE.SphereGeometry(breed.size * 0.08, 8, 8);
                const irisMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x00ff00,
                    roughness: 0.1,
                    metalness: 0.3
                });
                const iris = new THREE.Mesh(irisGeometry, irisMaterial);
                iris.position.set((i - 0.5) * breed.size * 0.3, breed.size * 0.05, breed.size * 0.32);
                iris.scale(1, 0.8, 0.2);
                head.add(iris);

                // Pupil (black part)
                const pupilGeometry = new THREE.SphereGeometry(breed.size * 0.04, 6, 6);
                const pupilMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x000000,
                    roughness: 0.1
                });
                const pupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
                pupil.position.set((i - 0.5) * breed.size * 0.3, breed.size * 0.05, breed.size * 0.34);
                pupil.scale(1, 1.5, 0.1);
                head.add(pupil);
            }

            // Ears - realistic cat ears with proper positioning
            for (let i = 0; i < 2; i++) {
                // Outer ear - triangular shape
                const outerEarGeometry = new THREE.ConeGeometry(breed.size * 0.1, breed.size * 0.25, 6);
                const outerEar = new THREE.Mesh(outerEarGeometry, bodyMaterial);
                outerEar.position.set((i - 0.5) * breed.size * 0.35, breed.size * 0.4, breed.size * 0.48);
                outerEar.rotation.z = (i - 0.5) * 0.25;
                outerEar.rotation.x = -0.15;
                head.add(outerEar);

                // Inner ear (pink) - more detailed
                const innerEarGeometry = new THREE.ConeGeometry(breed.size * 0.06, breed.size * 0.18, 6);
                const innerEarMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xffb6c1,
                    roughness: 0.4
                });
                const innerEar = new THREE.Mesh(innerEarGeometry, innerEarMaterial);
                innerEar.position.set((i - 0.5) * breed.size * 0.35, breed.size * 0.4, breed.size * 0.55);
                innerEar.rotation.z = (i - 0.5) * 0.25;
                innerEar.rotation.x = -0.15;
                head.add(innerEar);
            }

            // Whiskers
            for (let side = 0; side < 2; side++) {
                for (let i = 0; i < 4; i++) {
                    const whiskerGeometry = new THREE.CylinderGeometry(0.001, 0.001, breed.size * 0.4);
                    const whiskerMaterial = new THREE.MeshStandardMaterial({ 
                        color: 0x333333,
                        roughness: 0.1
                    });
                    const whisker = new THREE.Mesh(whiskerGeometry, whiskerMaterial);
                    whisker.position.set(
                        (side - 0.5) * breed.size * 0.2,
                        -breed.size * 0.05,
                        breed.size * 0.25 + i * breed.size * 0.05
                    );
                    whisker.rotation.z = (side - 0.5) * 0.8 + (i - 1.5) * 0.2;
                    whisker.rotation.y = (i - 1.5) * 0.1;
                    head.add(whisker);
                }
            }

            // Legs - more slender and realistic like the photo
            for (let i = 0; i < 4; i++) {
                const legGeometry = new THREE.CylinderGeometry(breed.size * 0.05, breed.size * 0.07, breed.size * 0.65);
                const leg = new THREE.Mesh(legGeometry, bodyMaterial);
                
                let xPos, zPos;
                if (i < 2) { // front legs - more slender
                    xPos = (i - 0.5) * breed.size * 0.25;
                    zPos = breed.size * 0.5;
                } else { // back legs - slightly wider stance
                    xPos = (i - 2.5) * breed.size * 0.3;
                    zPos = -breed.size * 0.4;
                }
                
                leg.position.set(xPos, -breed.size * 0.32, zPos);
                leg.castShadow = true;
                player.add(leg);

                // Paws - more delicate and realistic
                const pawGeometry = new THREE.SphereGeometry(breed.size * 0.08, 12, 12);
                pawGeometry.scale(1.3, 0.2, 1.6);
                const paw = new THREE.Mesh(pawGeometry, bodyMaterial);
                paw.position.set(xPos, -breed.size * 0.6, zPos);
                paw.castShadow = true;
                player.add(paw);
            }

            // Tail - more realistic
            const tailCurve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, -breed.size * 0.1, -breed.size * 0.4),
                new THREE.Vector3(0, -breed.size * 0.2, -breed.size * 0.7),
                new THREE.Vector3(breed.size * 0.2, -breed.size * 0.15, -breed.size * 1.0)
            ]);
            
            const tailGeometry = new THREE.TubeGeometry(tailCurve, 20, breed.size * 0.06, 8, false);
            const tail = new THREE.Mesh(tailGeometry, bodyMaterial);
            tail.castShadow = true;
            player.add(tail);

            scene.add(player);
        }

        function createCollectibles() {
            const fishGeometry = new THREE.ConeGeometry(0.3, 0.6, 8);
            const fishMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xff6347,
                roughness: 0.3,
                metalness: 0.2
            });

            for (let i = 0; i < 10; i++) {
                const fish = new THREE.Mesh(fishGeometry, fishMaterial);
                fish.position.set(
                    (Math.random() - 0.5) * 20,
                    0.5,
                    (Math.random() - 0.5) * 20
                );
                fish.rotation.z = Math.random() * Math.PI;
                fish.castShadow = true;
                fish.userData.isCollectible = true;
                collectibles.push(fish);
                scene.add(fish);
            }
        }

        function setupControls() {
            document.addEventListener('keydown', (event) => {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW':
                        moveForward = true;
                        break;
                    case 'ArrowDown':
                    case 'KeyS':
                        moveBackward = true;
                        break;
                    case 'ArrowLeft':
                    case 'KeyA':
                        moveLeft = true;
                        break;
                    case 'ArrowRight':
                    case 'KeyD':
                        moveRight = true;
                        break;
                    case 'Space':
                        if (player && (player.position.y <= catBreeds[selectedCat].size + 0.1)) {
                            velocity.y = 6; // Slightly higher jump for better object access
                        }
                        break;
                }
            });

            document.addEventListener('keyup', (event) => {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW':
                        moveForward = false;
                        break;
                    case 'ArrowDown':
                    case 'KeyS':
                        moveBackward = false;
                        break;
                    case 'ArrowLeft':
                    case 'KeyA':
                        moveLeft = false;
                        break;
                    case 'ArrowRight':
                    case 'KeyD':
                        moveRight = false;
                        break;
                }
            });

            document.addEventListener('mousemove', (event) => {
                const mouseX = (event.clientX / window.innerWidth) * 2 - 1;
                const mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
                
                if (player) {
                    player.rotation.y = mouseX * Math.PI;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (player) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                const speed = catBreeds[selectedCat].speed * 5;
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                player.position.x += velocity.x * delta;
                player.position.y += velocity.y * delta;
                player.position.z += velocity.z * delta;

                // Check object collisions for jumping
                const collision = checkObjectCollisions();
                
                // Keep player on ground or object
                if (!collision.onObject && player.position.y <= catBreeds[selectedCat].size) {
                    player.position.y = catBreeds[selectedCat].size;
                    velocity.y = 0;
                }

                // Keep player in bounds
                player.position.x = Math.max(-14, Math.min(14, player.position.x));
                player.position.z = Math.max(-14, Math.min(14, player.position.z));

                // Check collectibles
                checkCollectibles();
            }

            renderer.render(scene, camera);
            composer.render();
            prevTime = time;
        }

        function checkObjectCollisions() {
            if (!player) return { onObject: false, highestObject: catBreeds[selectedCat].size };
            
            let onObject = false;
            let highestObject = catBreeds[selectedCat].size; // Default ground level
            
            // Check collision with jumpable objects
            for (const object of jumpableObjects) {
                const objectBox = new THREE.Box3().setFromObject(object);
                const playerBox = new THREE.Box3().setFromObject(player);
                
                if (objectBox.intersectsBox(playerBox)) {
                    const objectTop = objectBox.max.y;
                    const playerBottom = playerBox.min.y;
                    
                    // Check if player is landing on top of object
                    if (playerBottom >= objectTop - 0.3 && velocity.y <= 0) {
                        highestObject = Math.max(highestObject, objectTop);
                        onObject = true;
                        
                        // Keep player on object surface
                        if (player.position.y <= objectTop + catBreeds[selectedCat].size + 0.1) {
                            player.position.y = objectTop + catBreeds[selectedCat].size;
                            velocity.y = 0;
                        }
                    }
                }
            }
            
            return { onObject, highestObject };
        }

        function checkCollectibles() {
            for (let i = collectibles.length - 1; i >= 0; i--) {
                const collectible = collectibles[i];
                const distance = player.position.distanceTo(collectible.position);
                
                if (distance < 1) {
                    scene.remove(collectible);
                    collectibles.splice(i, 1);
                    score++;
                    document.getElementById('scoreValue').textContent = score;
                    
                    // Respawn fish after delay
                    setTimeout(() => {
                        collectible.position.set(
                            (Math.random() - 0.5) * 20,
                            0.5,
                            (Math.random() - 0.5) * 20
                        );
                        scene.add(collectible);
                        collectibles.push(collectible);
                    }, 3000);
                }
            }
        }

        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
